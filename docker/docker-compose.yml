# SmartInventory — Docker Compose (Supabase self-host completo)
# Requisito único en el host: Docker Desktop
#
# Uso:
#   cp .env.example .env      # rellenar secretos
#   docker compose up -d
#
# URLs:
#   Kong (API gateway):  http://localhost:8000
#   Supabase Studio:     http://localhost:3000
#   Inbucket (email):    http://localhost:9000
#   Web (Next.js):       http://localhost:3001
#
# Variables internas (SSR dentro de Docker):
#   SUPABASE_INTERNAL_URL=http://kong:8000

services:

  # ─────────────────────────────────────────────────────
  # 1. POSTGRES + pgvector
  # ─────────────────────────────────────────────────────
  db:
    image: supabase/postgres:15.8.1.060
    healthcheck:
      test: pg_isready -U postgres -h localhost
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY:-3600}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ─────────────────────────────────────────────────────
  # 2. MIGRATION RUNNER (aplica migraciones automáticamente)
  # ─────────────────────────────────────────────────────
  migration-runner:
    image: supabase/postgres:15.8.1.060
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ../supabase/migrations:/migrations:ro
    entrypoint: >
      bash -c "
        echo '=== Applying migrations ===' &&
        for f in /migrations/*.sql; do
          echo \"Applying: \$$f\" &&
          psql -h db -U postgres -d ${POSTGRES_DB:-postgres} -f \"\$$f\" || exit 1;
        done &&
        echo '=== Migrations done ==='"

  # ─────────────────────────────────────────────────────
  # 3. VECTOR (embeddings helper — Supabase pg_net + vector)
  # ─────────────────────────────────────────────────────
  vector:
    image: timberio/vector:0.28.1-alpine
    restart: unless-stopped
    volumes:
      - ./vector.yml:/etc/vector/vector.yml:ro
    depends_on:
      - db

  # ─────────────────────────────────────────────────────
  # 4. GOTRUE (auth)
  # ─────────────────────────────────────────────────────
  auth:
    image: supabase/gotrue:v2.170.0
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health" ]
      timeout: 5s
      interval: 5s
      retries: 3
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8000}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3001}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: false
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: true
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: false
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-true}
      # Inbucket SMTP (local dev mailcatcher)
      GOTRUE_SMTP_HOST: inbucket
      GOTRUE_SMTP_PORT: 2500
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-SmartInventory}
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify

  # ─────────────────────────────────────────────────────
  # 5. POSTGREST (REST API)
  # ─────────────────────────────────────────────────────
  rest:
    image: postgrest/postgrest:v12.2.0
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public,storage,graphql_public}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: false
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY:-3600}
    command: postgrest

  # ─────────────────────────────────────────────────────
  # 6. REALTIME
  # ─────────────────────────────────────────────────────
  realtime:
    image: supabase/realtime:v2.34.47
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-sSfL", "--head", "-o", "/dev/null", "-H", "Authorization: Bearer ${SUPABASE_ANON_KEY}", "http://localhost:4000/api/tenants/realtime-dev/health" ]
      timeout: 5s
      interval: 5s
      retries: 3
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: ${REALTIME_DB_ENC_KEY:-supabaserealtime}
      API_JWT_SECRET: ${JWT_SECRET}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: ${REALTIME_SECRET_KEY_BASE}
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: false
      DNS_NODES: "''"
    command: >
      sh -c "/app/bin/migrate && /app/bin/realtime eval 'Realtime.Release.seeds(Realtime.Repo)' && /app/bin/server"

  # ─────────────────────────────────────────────────────
  # 7. STORAGE
  # ─────────────────────────────────────────────────────
  storage:
    image: public.ecr.aws/supabase/storage-api:v1.37.7
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
      imgproxy:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/status" ]
      timeout: 5s
      interval: 5s
      retries: 3
    restart: unless-stopped
    environment:
      ANON_KEY: ${SUPABASE_ANON_KEY}
      SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      FILE_SIZE_LIMIT: 52428800 # 50 MB
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: true
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - storage_data:/var/lib/storage

  # ─────────────────────────────────────────────────────
  # 8. IMGPROXY (image transformations for storage)
  # ─────────────────────────────────────────────────────
  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    healthcheck:
      test: [ "CMD", "imgproxy", "health" ]
      timeout: 5s
      interval: 5s
      retries: 3
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: true
      IMGPROXY_ENABLE_WEBP_DETECTION: true
    volumes:
      - storage_data:/var/lib/storage:ro
    restart: unless-stopped

  # ─────────────────────────────────────────────────────
  # 9. META (Postgres meta API — used by Studio)
  # ─────────────────────────────────────────────────────
  meta:
    image: supabase/postgres-meta:v0.84.2
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}

  # ─────────────────────────────────────────────────────
  # 10. EDGE FUNCTIONS (Deno)
  # ─────────────────────────────────────────────────────
  functions:
    image: supabase/edge-runtime:v1.67.4
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      # IA keys (SERVER ONLY — nunca en el cliente)
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_VISION_MODEL: ${GROQ_VISION_MODEL:-llama-3.2-11b-vision-preview}
      AI_PROVIDER_PRIMARY: ${AI_PROVIDER_PRIMARY:-gemini}
      AI_PROVIDER_FALLBACK: ${AI_PROVIDER_FALLBACK:-groq}
    volumes:
      - ../supabase/functions:/home/deno/functions:rw
    command:
      - start
      - --main-service
      - /home/deno/functions

  # ─────────────────────────────────────────────────────
  # 11. KONG (API gateway — expuesto en :8000)
  # ─────────────────────────────────────────────────────
  kong:
    image: kong:2.8.1
    restart: unless-stopped
    ports:
      - "8000:8000/tcp"
      - "8443:8443/tcp"
    depends_on:
      db:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/temp.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-supabase}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-this_password_is_insecure_and_should_be_updated}
    volumes:
      - ./kong.yml:/home/kong/temp.yml:ro
    healthcheck:
      test: [ "CMD", "kong", "health" ]
      interval: 10s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────
  # 12. STUDIO (panel visual de Supabase)
  # ─────────────────────────────────────────────────────
  studio:
    image: supabase/studio:20250113-83c9420
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/api/profile', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)}).on('error', () => process.exit(1))" ]
      timeout: 5s
      interval: 5s
      retries: 3
    depends_on:
      auth:
        condition: service_healthy
      rest:
        condition: service_started
      meta:
        condition: service_started
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-SmartInventory}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-smartinventory}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${API_EXTERNAL_URL:-http://localhost:8000}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      LOGFLARE_API_KEY: your-super-secret-and-long-logflare-key
      LOGFLARE_URL: http://analytics:4000
      NEXT_PUBLIC_ENABLE_LOGS: true
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
    ports:
      - "3000:3000"

  # ─────────────────────────────────────────────────────
  # 13. INBUCKET (local SMTP / email catcher para magic link)
  # ─────────────────────────────────────────────────────
  inbucket:
    image: inbucket/inbucket:stable
    restart: unless-stopped
    ports:
      - "9000:9000" # Web UI
      - "2500:2500" # SMTP
      - "1100:1100" # POP3

  # ─────────────────────────────────────────────────────
  # 14. WEB (Next.js)
  # ─────────────────────────────────────────────────────
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: development
      # URL pública (browser → kong)
      NEXT_PUBLIC_SUPABASE_URL: ${API_EXTERNAL_URL:-http://localhost:8000}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      NEXT_PUBLIC_BASE_URL: ${SITE_URL:-http://localhost:3001}
      NEXT_PUBLIC_AI_MODE: ${AI_MODE:-real}
      # URL interna (SSR dentro del contenedor → kong)
      SUPABASE_INTERNAL_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      # Auth bypass (solo si DEV_AUTH_BYPASS=true en .env)
      DEV_AUTH_BYPASS: ${DEV_AUTH_BYPASS:-false}
      AI_MODE: ${AI_MODE:-real}
    volumes:
      - ../apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      kong:
        condition: service_healthy
      auth:
        condition: service_healthy
      storage:
        condition: service_healthy

  # ─────────────────────────────────────────────────────
  # 15. CADDY (HTTPS + Reverse Proxy)
  # ─────────────────────────────────────────────────────
  caddy:
    image: caddy:2.7-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      EMAIL: ${EMAIL:-info@example.com}
      SITE_ADDRESS: ${SITE_ADDRESS:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_started
      kong:
        condition: service_started

volumes:
  postgres_data:
  storage_data:
  caddy_data:
  caddy_config:
